services:
  db:
    image: mysql:8.0
    container_name: dungeonquest-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dungeonquest-app
    restart: unless-stopped
    environment:
      CONNECTION_STRING: ${CONNECTION_STRING}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
